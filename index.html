<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Productivity Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="overflow-hidden bg-black">

<div id="scene" class="relative w-full h-screen">

    <!-- Background Images -->

    <div class="bg-layer bg-day-1"
    style="background-image:url('Images/dawid-zawila--G3rw6Y02D0-unsplash.jpg')"></div>

    <div class="bg-layer bg-day-2"
    style="background-image:url('Images/nicolas-lysandrou-IHqt0u7G48Q-unsplash.jpg')"></div>

    <div class="bg-layer bg-night-1"
    style="background-image:url('Images/claudio-testa-fb_CZ4hZXWo-unsplash.jpg')"></div>

    <div class="bg-layer bg-night-2"
    style="background-image:url('Images/troy-olson-qxXnrwy37CI-unsplash.jpg')"></div>

    <div class="absolute inset-0 bg-black/30"></div>


    <!-- ================= NAVBAR ================= -->

    <nav
    class="absolute top-0 left-0 right-0
    flex justify-between items-center
    px-8 py-3
    backdrop-blur-xl
    bg-white/10
    border-b border-white/20">

        <h1
        class="text-white text-lg md:text-xl font-semibold">
        Productivity Dashboard
        </h1>


        <div class="flex items-center gap-4">

            <!-- Theme -->

            <div
            class="flex bg-black/30 rounded-full p-1">

                <button
                id="lightBtn"
                class="px-3 py-1 rounded-full">
                ☀️
                </button>

                <button
                id="darkBtn"
                class="px-3 py-1 rounded-full bg-white text-black">
                🌙
                </button>

            </div>

            <!-- Time -->

            <div
            class="flex gap-1">

                <select id="hour"
                class="glassInput"></select>

                <select id="minute"
                class="glassInput"></select>

                <select id="ampm"
                class="glassInput">

                    <option>AM</option>
                    <option>PM</option>

                </select>

                <button
                id="setTime"
                class="glassButton">
                Set
                </button>

                <button
                id="liveBtn"
                class="glassButton">
                Live
                </button>

            </div>

            <span
            id="clock"
            class="text-white text-sm font-mono">
            00:00:00
            </span>

        </div>

    </nav>


    <!-- ================= HOVER LABEL ================= -->

    <div
    id="hoverLabel"
    class="absolute
    top-20
    left-1/2
    -translate-x-1/2

    glass

    px-4
    py-2
    rounded-full

    opacity-0

    transition">

    Brighter View

    </div>


    <!-- ================= WEATHER CARD ================= -->

    <div
    class="absolute

    left-8
    bottom-8

    glass

    rounded-3xl

    flex
    flex-col

    md:flex-row

    overflow-hidden">

        <div
        class="p-8">

            <p
            id="date"
            class="uppercase tracking-widest text-gray-300 text-sm">
            Saturday
            </p>

            <h2
            id="bigClock"
            class="text-5xl font-bold text-white mt-2">
            08:30 PM
            </h2>

            <p
            class="mt-3 text-gray-300">
            Nawada (Bihar)
            </p>

        </div>

        <div class="w-px bg-white/20 hidden md:block"></div>

        <div
        class="p-8">

            <h2
            class="text-white text-4xl font-bold">
            29°
            </h2>

            <p class="text-gray-300 mt-2">

            Sunny Morning

            </p>

            <div
            class="mt-6 text-gray-300 text-sm space-y-2">

                <p>Humidity : 74%</p>

                <p>Wind : 14 km/h</p>

                <p>Heat Index : 34°C</p>

            </div>

        </div>

    </div>


    <!-- ================= BUTTONS ================= -->

    <div
    class="absolute

    right-6

    top-1/2

    -translate-y-1/2

    flex

    flex-col

    gap-5">

        <a href="todo.html"
        class="featureBtn">

        ✅
        <span>Task</span>

        </a>

        <a href="goal.html"
        class="featureBtn">

        🎯
        <span>Goal</span>

        </a>

        <a href="planner.html"
        class="featureBtn">

        🗓
        <span>Planner</span>

        </a>

        <a href="quotes.html"
        class="featureBtn">

        💬
        <span>Quotes</span>

        </a>

        <a href="timer.html"
        class="featureBtn">

        ⏱
        <span>Timer</span>

        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
