<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote of the Day</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Quote Card -->
  <div class="relative bg-gray-700 text-white w-11/12 max-w-4xl rounded-xl shadow-2xl p-8">

    <!-- Header -->
    <div class="flex justify-between items-center">
      <!-- Badge -->
      <div class="bg-white text-gray-700 text-xs font-semibold px-3 py-1 rounded">
        Quote of the Day
      </div>

      <!-- Close Button -->
      <a href="index.html"
         class="text-white text-xl font-bold hover:text-red-400 transition">
        ✕
      </a>
    </div>

    <!-- Quote -->
    <div class="mt-8">
      <p class="text-2xl md:text-3xl font-bold leading-relaxed">
        “Success is not final, failure is not fatal:
        it is the courage to continue that counts.”
      </p>
    </div>

    <!-- Author -->
    <div class="flex justify-end mt-8">
      <span class="bg-white text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold shadow">
        — Winston Churchill
      </span>
    </div>

  </div>

</body>
</html>
