<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-400">
  <div class="flex justify-between p-5">
        <div class="font-black text-2xl text-white">Quotes</div>
        <div class="font-black text-2xl text-white"><a href="index.html">X</a></div>
      </div>

    <div class="min-h-screen flex items-center justify-center">
      

        <div class="w-full max-w-5xl text-center px-6">

            <!-- Quote -->
            <h1 id="quote"
                class="text-white text-3xl md:text-5xl font-bold leading-tight">
                "Small daily improvements are the key
                <br>
                to long-term results."
            </h1>

            <!-- Author -->
            <p id="author"
               class="text-gray-400 text-lg mt-6">
                — Robin Sharma
            </p>

            <!-- Button -->
            <button id="newQuote"
                class="mt-14 bg-slate-700 hover:bg-slate-600
                       text-white font-semibold
                       px-10 py-4 rounded-xl
                       transition duration-300 shadow-lg">
                New Quote
            </button>

        </div>

    </div>


<script src="quotes.js"></script>

</body>
</html>
